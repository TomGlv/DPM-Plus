name: DPM+
on:
  schedule:
    - cron: '*/10 * * * *' 
  workflow_dispatch: 

jobs:
  check-match:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Supprime l'avertissement Node.js
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          # On a enlevé le cache ici pour éviter l'erreur de fichier manquant

      - name: Install Dependencies
        run: pip install requests

      - name: Run Tracker
        env:
          RIOT_KEY: ${{ secrets.RIOT_KEY }}
          WEBHOOK: ${{ secrets.WEBHOOK }}
        run: python OPGG_.py
